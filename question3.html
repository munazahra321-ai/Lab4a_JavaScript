<!DOCTYPE html>
<html>
<body>
    <h2>Looping Number Lab 4a</h2>
    <div id="displayArea"></div>

    <script>
        let text = "";
        // Gelung untuk nombor 1 hingga 5
        for (let i = 1; i <= 5; i++) {
            text += "The number is " + i + "<br>";
        }
        // Paparkan pada skrin
        document.getElementById("displayArea").innerHTML = text;
    </script>
</body>
</html>
