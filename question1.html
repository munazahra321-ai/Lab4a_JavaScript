<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 4a - Question 1</title>
</head>
<body>

    <div id="myElement">
        <p id="message">Welcome to my website!</p>
    </div>

    <script>
        // Select the paragraph element using its parent or by adding an ID
        // Here we use querySelector to target the p inside #myElement
        const paragraph = document.querySelector("#myElement p");
        
        // Change the content to "Hello there!"
        paragraph.innerHTML = "Hello there!";
    </script>

</body>
</html>
