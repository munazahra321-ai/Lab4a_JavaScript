<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 4a - Question 2</title>
</head>
<body>

    <h2>Number Validator</h2>
    <input type="text" id="userInput" placeholder="Enter a number">
    <button onclick="checkInput()">Check</button> 

    <script>
        /**
         * Validates the user input from the text field.
         * Demonstrates event handling and conditional logic.
         */
        function checkInput() { 
            // Get the value from the input field
            const val = document.getElementById("userInput").value; 
            
            // Check if the input is empty or not a number
            if (val === "" || isNaN(val)) { 
                alert("Please insert a number!"); 
            } 
            // Check if number is lower than 10
            else if (Number(val) < 10) { 
                alert("The number is lower than 10"); 
            } 
            // Check if number is higher than 10 (or equal)
            else { 
                alert("The number is higher than 10"); 
            }
        }
    </script>

</body>
</html>
